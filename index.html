<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Mint's Galaxy</title>
    <style>
        /* 1. Thiết lập nền ảnh hoa hồng */
        body {
            background-image: url('background.jpg'); /* Đảm bảo tên file ảnh chính xác */
            background-attachment: fixed; /* Giữ nền cố định khi cuộn trang */
            background-size: cover;
            background-position: center;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; /* Font chữ có chân cổ điển */
            color: #4a3728; /* Màu nâu đậm của mực cũ */
            margin: 0;
            padding: 0;
        }

        /* 2. Khung Logo ở giữa */
        .header-container {
            text-align: center;
            padding-top: 50px;
        }

        .logo-box {
            display: inline-block;
            border: 1px solid #8d7561;
            padding: 10px 30px;
            margin-bottom: 10px;
            background-color: rgba(255, 255, 255, 0.2); /* Làm mờ nhẹ nền logo */
        }

        .site-title {
            font-size: 45px;
            margin: 10px 0;
            font-weight: normal;
        }

        .site-slogan {
            font-style: italic;
            font-size: 18px;
            margin-bottom: 30px;
        }

        /* 3. Thanh Menu tối giản */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .nav-item {
            background-color: #5d4737; /* Màu nâu đậm giống hình mẫu */
            color: #ffffff;
            text-decoration: none;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 2px;
        }
        
        /* Hiệu ứng khi di chuột vào nút */
        .nav-item:hover {
            background-color: #7a5f4a;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-box">
            <div style="font-size: 12px; border: 1px solid #8d7561; padding: 5px;">
                LITTLE MINT'S GALAXY
            </div>
        </div>

        <h1 class="site-title">Little Mint's Galaxy</h1>
        <p class="site-slogan">Sinh tử tương hứa, khắc cốt tương tư</p>

        <div class="nav-bar">
            <a href="#" class="nav-item">Chủ nhà</a>
            <a href="#" class="nav-item">Kho báu ▾</a>
            <a href="#" class="nav-item">Sao vụt tắt ▾</a>
        </div>
    </div>

</body>
</html>
